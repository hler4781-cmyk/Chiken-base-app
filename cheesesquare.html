<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cheese Square – Taste the Cheese Magic</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --yellow:#FFD700;
  --gold:#F5A800;
  --red:#E31837;
  --dark:#1A1A1A;
  --white:#fff;
  --card:#fff;
  --shadow:0 4px 20px rgba(0,0,0,.13);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#FFF9E6;color:var(--dark);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--dark);color:var(--white);padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--yellow);letter-spacing:1px;}
.logo span{color:var(--white);}
.header-right{display:flex;gap:10px;align-items:center;}
.cart-btn{background:var(--red);color:#fff;border:none;border-radius:30px;padding:8px 18px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative;}
.cart-count{background:var(--yellow);color:var(--dark);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;}
.wa-header-btn{background:#25D366;color:#fff;border:none;border-radius:30px;padding:8px 14px;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--dark) 60%,var(--red) 100%);color:#fff;padding:28px 16px 20px;text-align:center;}
.hero h1{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--yellow);text-shadow:0 2px 8px rgba(0,0,0,.3);}
.hero p{font-size:.95rem;opacity:.85;margin:6px 0 14px;}
.delivery-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid var(--yellow);border-radius:30px;padding:6px 16px;font-size:.85rem;color:var(--yellow);font-weight:700;}
.delivery-badge .dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LOCATION BAR ── */
.location-bar{background:var(--white);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--yellow);gap:8px;flex-wrap:wrap;}
.loc-info{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:700;color:var(--dark);}
.loc-info span{color:var(--red);}
.loc-actions{display:flex;gap:8px;}
.loc-btn{background:var(--yellow);color:var(--dark);border:none;border-radius:20px;padding:6px 14px;font-size:.8rem;font-weight:800;cursor:pointer;}
.share-btn{background:var(--dark);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:.8rem;font-weight:800;cursor:pointer;}

/* ── CATEGORIES ── */
.cats{display:flex;gap:10px;overflow-x:auto;padding:14px 16px;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat{flex-shrink:0;background:var(--white);border:2px solid transparent;border-radius:30px;padding:8px 18px;font-size:.85rem;font-weight:800;cursor:pointer;transition:.2s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.cat.active,.cat:hover{background:var(--yellow);border-color:var(--gold);color:var(--dark);}

/* ── MENU GRID ── */
.section{padding:0 16px 24px;}
.section-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--red);margin:18px 0 12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--yellow),transparent);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.2s;cursor:pointer;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.16);}
.card-img{width:100%;height:120px;object-fit:cover;background:linear-gradient(135deg,#FFD700 0%,#F5A800 100%);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.card-body{padding:10px;}
.card-name{font-weight:800;font-size:.9rem;line-height:1.2;margin-bottom:4px;}
.card-desc{font-size:.72rem;color:#666;margin-bottom:8px;line-height:1.3;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--red);}
.add-btn{background:var(--yellow);border:none;border-radius:20px;padding:5px 12px;font-weight:800;font-size:.8rem;cursor:pointer;color:var(--dark);transition:.15s;}
.add-btn:hover{background:var(--gold);}

/* Size selector */
.size-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.size-sel button{background:#f5f5f5;border:1.5px solid #ddd;border-radius:12px;padding:3px 9px;font-size:.72rem;font-weight:700;cursor:pointer;}
.size-sel button.active{background:var(--yellow);border-color:var(--gold);}

/* ── DEALS ── */
.deal-card{background:linear-gradient(135deg,var(--dark),#333);color:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px;}
.deal-label{background:var(--red);display:inline-block;border-radius:8px;padding:2px 10px;font-size:.75rem;font-weight:800;margin-bottom:6px;text-transform:uppercase;}
.deal-name{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--yellow);}
.deal-items{font-size:.8rem;opacity:.8;margin:4px 0 8px;line-height:1.6;}
.deal-footer{display:flex;align-items:center;justify-content:space-between;}
.deal-price{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--yellow);}

/* ── CART MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;}
.overlay.open{display:flex;}
.cart-sheet{background:#fff;width:100%;max-height:90vh;border-radius:24px 24px 0 0;overflow-y:auto;padding:20px;}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 16px;}
.sheet-title{font-family:'Fredoka One',cursive;font-size:1.3rem;margin-bottom:14px;}
.cart-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.ci-name{flex:1;font-weight:700;font-size:.9rem;}
.ci-price{color:var(--red);font-weight:800;}
.ci-qty{display:flex;align-items:center;gap:8px;}
.ci-qty button{width:28px;height:28px;border-radius:50%;border:none;background:var(--yellow);font-size:1rem;font-weight:900;cursor:pointer;}
.cart-total{display:flex;justify-content:space-between;padding:14px 0 4px;font-family:'Fredoka One',cursive;font-size:1.1rem;}
.order-form{margin-top:14px;}
.order-form input,.order-form textarea{width:100%;border:2px solid #eee;border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:.9rem;margin-bottom:10px;outline:none;}
.order-form input:focus,.order-form textarea:focus{border-color:var(--yellow);}
.order-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.order-wa{background:#25D366;color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.order-call{background:var(--dark);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;}
.empty-cart{text-align:center;padding:40px 0;color:#aaa;font-size:1rem;}

/* ── LOCATION MODAL ── */
.loc-modal{background:#fff;width:100%;max-height:90vh;border-radius:24px 24px 0 0;overflow-y:auto;padding:20px;}
.loc-modal h2{font-family:'Fredoka One',cursive;font-size:1.3rem;margin-bottom:14px;}
.map-placeholder{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:14px;height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;margin-bottom:14px;font-size:.9rem;color:#388e3c;font-weight:700;}
.map-pin{font-size:2.5rem;}
.share-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.share-wa{background:#25D366;color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;}
.share-copy{background:var(--dark);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;}
.loc-address{background:#f5f5f5;border-radius:12px;padding:12px;font-size:.85rem;color:#333;margin-bottom:12px;line-height:1.6;}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 22px;border-radius:30px;font-size:.88rem;font-weight:700;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;}
.toast.show{opacity:1;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);display:flex;justify-content:space-around;padding:8px 0 10px;z-index:100;}
.bnav-btn{background:none;border:none;color:#aaa;font-size:.65rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;}
.bnav-btn.active{color:var(--yellow);}
.bnav-icon{font-size:1.3rem;}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
}
</style>
</head>

const catLabels = {specials:'⭐ Special Pizza',extremes:'🔥 The Extremes',fusion:'🌶️ Regular Fusion',classics:'👑 Timeless Classics',starters:'🍗 Starters',cheesy:'🧀 Cheesy Delights',deals:'🎁 Deals',burgers:'🍔 Burgers & Sandwiches',drinks:'🥤 Drinks'};

// ── RENDER MENU ──
function renderMenu(cat='all'){
  const el = document.getElementById('menuContent');
  let html='';
  const cats = cat==='all'?Object.keys(menu):[cat];
  cats.forEach(c=>{
    html+=`<div class="section" id="sec-${c}"><div class="section-title">${catLabels[c]||c}</div>`;
    if(c==='deals'){
      menu[c].forEach(item=>{
        html+=`<div class="deal-card">
          <div class="deal-label">DEAL</div>
          <div class="deal-name">${item.emoji} ${item.name}</div>
          <div class="deal-items">${item.items||''}</div>
          <div class="deal-footer">
            <div class="deal-price">RS ${item.price.toLocaleString()}</div>
            <button class="add-btn" onclick="addToCart('${item.id}','${escQ(item.name)}',${item.price},'')">+ Add</button>
          </div>
        </div>`;
      });
    } else {
      html+='<div class="grid">';
      menu[c].forEach(item=>{
        if(item.sizes){
          const firstSize = Object.keys(item.sizes)[0];
          const firstPrice = item.sizes[firstSize];
          const sizeButtons = Object.entries(item.sizes).map(([s,p])=>
            `<button onclick="selectSize('${item.id}','${s}',${p},this)" class="${s===firstSize?'active':''}">${s}: RS${p}</button>`
          ).join('');
          html+=`<div class="card">
            <div class="card-img">${item.emoji}</div>
            <div class="card-body">
              <div class="card-name">${item.name}</div>
              <div class="card-desc">${item.desc}</div>
              <div class="size-sel" id="sz-${item.id}">${sizeButtons}</div>
              <div class="card-footer">
                <div class="card-price" id="pr-${item.id}">RS ${firstPrice.toLocaleString()}</div>
                <button class="add-btn" id="ab-${item.id}" onclick="addToCartSized('${item.id}','${escQ(item.name)}',${firstPrice},'${firstSize}')">+ Add</button>
              </div>
            </div>
          </div>`;
        } else {
          html+=`<div class="card">
            <div class="card-img">${item.emoji}</div>
            <div class="card-body">
              <div class="card-name">${item.name}</div>
              <div class="card-desc">${item.desc}</div>
              <div class="card-footer">
                <div class="card-price">RS ${item.price.toLocaleString()}</div>
                <button class="add-btn" onclick="addToCart('${item.id}','${escQ(item.name)}',${item.price},'')">+ Add</button>
              </div>
            </div>
          </div>`;
        }
      });
      html+='</div>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

function escQ(s){return s.replace(/'/g,"\\'");}

let selectedSizes = {};

function selectSize(id, size, price, btn){
  selectedSizes[id] = {size, price};
  document.querySelectorAll(`#sz-${id} button`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`pr-${id}`).textContent = `RS ${price.toLocaleString()}`;
  document.getElementById(`ab-${id}`).onclick = ()=>addToCartSized(id, btn.closest('.card').querySelector('.card-name').textContent, price, size);
}

function addToCartSized(id, name, price, size){
  const sel = selectedSizes[id];
  if(sel){addToCart(id+sel.size, name, sel.price, sel.size);}
  else{addToCart(id+size, name, price, size);}
}

function addToCart(id, name, price, size){
  const label = size ? `${name} (${size})` : name;
  const key = id;
  const existing = cart.find(i=>i.id===key);
  if(existing){existing.qty++;}
  else{cart.push({id:key,name:label,price,qty:1});}
  updateCartCount();
  showToast(`✅ ${label} cart mein add!`);
}

function updateCartCount(){
  const total = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent = total;
}

// ── CART ──
function openCart(){
  renderCartItems();
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart(e){
  if(e.target===document.getElementById('cartOverlay'))
    document.getElementById('cartOverlay').classList.remove('open');
}
function renderCartItems(){
  const el = document.getElementById('cartItems');
  const form = document.getElementById('orderForm');
  if(cart.length===0){
    el.innerHTML='<div class="empty-cart">🛒<br>Cart khali hai!<br><small>Kuch items add karein</small></div>';
    form.style.display='none';
    return;
  }
  let total=0;
  let html='';
  cart.forEach((item,i)=>{
    total+=item.price*item.qty;
    html+=`<div class="cart-item">
      <div class="ci-name">${item.name}</div>
      <div class="ci-qty">
        <button onclick="changeQty(${i},-1)">−</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${i},1)">+</button>
      </div>
      <div class="ci-price">RS ${(item.price*item.qty).toLocaleString()}</div>
    </div>`;
  });
  html+=`<div class="cart-total"><span>Total</span><span>RS ${total.toLocaleString()}</span></div>`;
  el.innerHTML=html;
  form.style.display='block';
}
function changeQty(i, delta){
  cart[i].qty+=delta;
  if(cart[i].qty<=0)cart.splice(i,1);
  updateCartCount();
  renderCartItems();
}

// ── WHATSAPP ORDER ──
function sendWhatsApp(){
  const name=document.getElementById('custName').value||'Customer';
  const phone=document.getElementById('custPhone').value||'—';
  const addr=document.getElementById('custAddr').value||'—';
  if(cart.length===0){showToast('❌ Cart khali hai!');return;}
  let msg=`🍕 *CHEESE SQUARE ORDER*\n\n`;
  msg+=`👤 *Naam:* ${name}\n📞 *Phone:* ${phone}\n📍 *Address:* ${addr}\n`;
  if(userLat)msg+=`🗺️ *Location:* https://maps.google.com/?q=${userLat},${userLng}\n`;
  msg+=`\n🛒 *Order Details:*\n`;
  let total=0;
  cart.forEach(i=>{msg+=`• ${i.name} x${i.qty} = RS ${(i.price*i.qty).toLocaleString()}\n`;total+=i.price*i.qty;});
  msg+=`\n💰 *Total: RS ${total.toLocaleString()}*\n⏰ *Delivery: 30-40 min*\n\nShukriya! 🙏`;
  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`,'_blank');
}

function filterCat(cat, btn){
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));

  renderMenu(cat);
}
function scrollToSection(cat){
  setTimeout(()=>{
    const el=document.getElementById(`sec-${cat}`);
    if(el)el.scrollIntoView({behavior:'smooth'});
  },100);
}

// ── LOCATION ──
function getLocation(){
  if(!navigator.geolocation){showToast('Location support nahi hai');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    userAddress=`Lat: ${userLat.toFixed(4)}, Lng: ${userLng.toFixed(4)}`;
    document.getElementById('locText').textContent = userAddress;
    showToast('✅ Location mil gayi!');
    reverseGeocode();
  },()=>showToast('❌ Location nahi mili'));
}
function reverseGeocode(){
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLng}`)
    .then(r=>r.json()).then(d=>{
      userAddress=d.display_name||userAddress;
      document.getElementById('locText').textContent=userAddress.substring(0,50)+'...';
    }).catch(()=>{});
}

// ── LOCATION MODAL ──
function openLocModal(){
  document.getElementById('locOverlay').classList.add('open');
  if(userLat){
    document.getElementById('mapPlaceholder').style.background='linear-gradient(135deg,#e3f2fd,#bbdefb)';
    document.getElementById('mapText').textContent=`📍 ${userLat.toFixed(5)}, ${userLng.toFixed(5)}`;
    document.getElementById('locAddress').textContent=userAddress;
    document.getElementById('mapPlaceholder').style.color='#1565c0';
  } else {
    document.getElementById('mapText').textContent='Pehle Location button dabayein';
    document.getElementById('locAddress').textContent='Location abhi tak nahi mili. "📍 Location" button use karein.';
  }
}
function closeLocModal(e){
  if(e.target===document.getElementById('locOverlay'))
    document.getElementById('locOverlay').classList.remove('open');
}
function shareLocationWA(){
  if(!userLat){showToast('Pehle location lein!');return;}
  const msg=`📍 Meri location:\nhttps://maps.google.com/?q=${userLat},${userLng}\n\n${userAddress}`;
  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`,'_blank');
}
function copyLocation(){
  if(!userLat){showToast('Pehle location lein!');return;}
  const url=`https://maps.google.com/?q=${userLat},${userLng}`;
  navigator.clipboard.writeText(url).then(()=>showToast('✅ Link copy ho gaya!'));
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──
renderMenu('all');
</script>
