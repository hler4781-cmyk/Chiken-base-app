<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کوئٹہ کراچی کیفے</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#c0111f;--dark-red:#8b0000;--gold:#f5c518;--gold2:#e0a500;--green:#1a7a2e;--white:#fff;--bg:#1a0305;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Noto Nastaliq Urdu',serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(192,17,31,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(245,197,24,.10) 0%,transparent 60%);animation:bgP 6s ease-in-out infinite alternate;pointer-events:none;z-index:0;}
@keyframes bgP{from{opacity:.7}to{opacity:1}}
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}
/* HEADER */
header{background:linear-gradient(135deg,var(--dark-red),var(--red),var(--dark-red));padding:24px 20px 18px;text-align:center;border-bottom:4px solid var(--gold);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,.03) 8px,rgba(255,255,255,.03) 16px);pointer-events:none;}
.logo-ring{width:72px;height:72px;border-radius:50%;background:var(--gold);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 0 4px var(--dark-red),0 0 0 7px var(--gold2),0 8px 25px rgba(0,0,0,.4);animation:logoF 3s ease-in-out infinite;}
@keyframes logoF{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
header h1{font-size:1.8rem;color:var(--gold);text-shadow:2px 2px 8px rgba(0,0,0,.6);line-height:1.3;}
.location-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);border:1px solid var(--gold2);border-radius:20px;padding:4px 14px;color:var(--gold);font-size:.78rem;margin-top:8px;}
.admin-btn-top{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.4);border:1px solid var(--gold2);border-radius:20px;padding:6px 12px;color:var(--gold);font-size:.72rem;cursor:pointer;font-family:'Noto Nastaliq Urdu',serif;}
/* INFO */
.info-card{background:linear-gradient(135deg,#1a0305,#2a0408);border-bottom:2px solid rgba(245,197,24,.25);padding:14px 20px;display:flex;flex-direction:column;gap:10px;}
.info-row{display:flex;align-items:center;gap:12px;}
.info-icon{width:34px;height:34px;border-radius:50%;background:rgba(192,17,31,.25);border:1px solid rgba(245,197,24,.4);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.info-label{color:rgba(245,197,24,.6);font-size:.7rem;display:block;}
.info-value{color:#fff;font-size:.86rem;line-height:1.4;}
.info-value a{color:#4fc3f7;text-decoration:none;direction:ltr;display:inline-block;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(245,197,24,.3),transparent);}
/* TABS */
.tabs{display:flex;background:#0d0002;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:50;}
.tab-btn{flex:1;padding:13px 8px;background:transparent;border:none;color:rgba(255,255,255,.5);font-family:'Noto Nastaliq Urdu',serif;font-size:1rem;cursor:pointer;transition:all .3s;position:relative;}
.tab-btn.active{color:var(--gold);background:linear-gradient(180deg,rgba(192,17,31,.3),transparent);}
.tab-btn.active::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;background:var(--gold);}
/* MENU */
.menu-section{display:none;padding:16px;}
.menu-section.active{display:block;}
.section-title{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gold);font-size:1.1rem;margin-bottom:14px;}
.section-title::before,.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);}
.menu-item{background:linear-gradient(135deg,rgba(192,17,31,.12),rgba(139,0,0,.08));border:1px solid rgba(245,197,24,.2);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;transition:all .25s;animation:itemIn .4s ease both;}
.menu-item:hover{border-color:var(--gold);transform:translateX(-3px);}
.menu-item.selected{border-color:var(--gold);background:linear-gradient(135deg,rgba(26,122,46,.25),rgba(20,90,30,.2));box-shadow:0 0 12px rgba(26,122,46,.3);}
@keyframes itemIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.item-name{color:#fff;font-size:.93rem;line-height:1.5;}
.item-price{color:var(--gold);font-size:.88rem;font-weight:700;margin-top:2px;direction:ltr;text-align:right;}
.qty-controls{display:flex;align-items:center;gap:8px;margin-right:8px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold2);background:rgba(245,197,24,.1);color:var(--gold);font-size:1.1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{background:var(--gold);color:#000;}
.qty-num{color:#fff;font-size:1rem;min-width:18px;text-align:center;direction:ltr;}
/* FAB */
.cart-fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--green),#0f5920);border:2px solid var(--gold);border-radius:50px;padding:13px 26px;color:#fff;font-family:'Noto Nastaliq Urdu',serif;font-size:1rem;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 20px rgba(26,122,46,.4);z-index:100;min-width:210px;justify-content:center;animation:fabP 2s ease-in-out infinite;}
@keyframes fabP{0%,100%{box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 20px rgba(26,122,46,.4)}50%{box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 35px rgba(26,122,46,.7)}}
.cart-count{background:var(--gold);color:#000;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:bold;direction:ltr;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(180deg,#1e0205,#0d0002);border:2px solid var(--gold);border-radius:24px 24px 0 0;padding:22px 18px 34px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(.22,1,.36,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{color:var(--gold);font-size:1.2rem;text-align:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(245,197,24,.3);}
.order-item-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);color:#fff;font-size:.88rem;}
.order-item-row .price{color:var(--gold);direction:ltr;}
.total-row{display:flex;justify-content:space-between;padding:12px 0 4px;color:var(--gold);font-size:1.05rem;font-weight:bold;}
.customer-section{background:rgba(255,255,255,.04);border:1px solid rgba(245,197,24,.2);border-radius:14px;padding:14px;margin:12px 0 6px;}
.customer-section-title{color:var(--gold);font-size:.88rem;margin-bottom:12px;}
.field-group{margin-bottom:10px;}
.field-group:last-child{margin-bottom:0;}
.note-label{color:rgba(255,255,255,.65);font-size:.8rem;margin-bottom:5px;display:block;}
.field-input,.note-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(245,197,24,.25);border-radius:10px;padding:10px 14px;color:#fff;font-family:'Noto Nastaliq Urdu',serif;font-size:.87rem;direction:rtl;outline:none;resize:none;}
.field-input:focus,.note-input:focus{border-color:var(--gold);}
.field-input::placeholder,.note-input::placeholder{color:rgba(255,255,255,.3);}
.required-star{color:#ff6b6b;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:16px;background:linear-gradient(135deg,#25d366,#128c4e);border:none;border-radius:50px;padding:15px 20px;color:#fff;font-family:'Noto Nastaliq Urdu',serif;font-size:1rem;cursor:pointer;font-weight:bold;transition:all .25s;}
.wa-btn:active{transform:scale(.97);}
.close-modal{display:block;width:100%;margin-top:10px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:11px;color:rgba(255,255,255,.6);font-family:'Noto Nastaliq Urdu',serif;font-size:.88rem;cursor:pointer;}
.close-modal:hover{border-color:var(--red);color:var(--red);}
.empty-msg{text-align:center;color:rgba(255,255,255,.4);padding:28px 0;font-size:.9rem;}
/* ADMIN LOGIN */
#adminLoginPage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;}
#adminLoginPage.active{display:flex;}
.login-box{background:linear-gradient(135deg,#1e0205,#2a0408);border:2px solid var(--gold);border-radius:20px;padding:32px 24px;width:100%;max-width:360px;text-align:center;}
.login-title{color:var(--gold);font-size:1.4rem;margin-bottom:6px;}
.login-sub{color:rgba(255,255,255,.5);font-size:.8rem;margin-bottom:24px;}
.login-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(245,197,24,.3);border-radius:12px;padding:14px;color:#fff;font-size:1.1rem;text-align:center;outline:none;margin-bottom:14px;letter-spacing:6px;direction:ltr;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--dark-red));border:none;border-radius:50px;padding:14px;color:#fff;font-family:'Noto Nastaliq Urdu',serif;font-size:1rem;cursor:pointer;transition:all .25s;}
.login-err{color:#ff6b6b;font-size:.82rem;margin-top:8px;display:none;}
.back-link{color:rgba(255,255,255,.4);font-size:.78rem;margin-top:16px;cursor:pointer;display:block;}
.back-link:hover{color:var(--gold);}
/* ADMIN PANEL */
#adminPage{min-height:100vh;}
#adminPage.active{display:block;}
.admin-header{background:linear-gradient(135deg,#0a0a1a,#12122a);border-bottom:3px solid var(--gold);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.admin-header h2{color:var(--gold);font-size:1.2rem;}
.admin-logout{background:rgba(192,17,31,.3);border:1px solid var(--red);border-radius:20px;padding:6px 14px;color:#fff;font-family:'Noto Nastaliq Urdu',serif;font-size:.78rem;cursor:pointer;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;}
.stat-card{background:linear-gradient(135deg,rgba(245,197,24,.1),rgba(245,197,24,.05));border:1px solid rgba(245,197,24,.25);border-radius:14px;padding:16px;text-align:center;}
.stat-num{color:var(--gold);font-size:1.6rem;font-weight:bold;direction:ltr;display:block;}
.stat-label{color:rgba(255,255,255,.6);font-size:.78rem;margin-top:4px;display:block;}
.filter-tabs{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;}
.filter-tab{padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-family:'Noto Nastaliq Urdu',serif;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .2s;}
.filter-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
.orders-section{padding:0 16px 100px;}
.order-card{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.1);border-radius:14px;margin-bottom:14px;overflow:hidden;animation:itemIn .4s ease both;}
.order-card.status-pending{border-color:rgba(245,197,24,.4);}
.order-card.status-done{border-color:rgba(26,122,46,.4);opacity:.75;}
.order-card.status-cancel{border-color:rgba(192,17,31,.3);opacity:.5;}
.order-card-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.07);}
.order-id{color:var(--gold);font-size:.82rem;direction:ltr;font-weight:bold;}
.order-time{color:rgba(255,255,255,.4);font-size:.72rem;direction:ltr;}
.order-card-body{padding:12px 14px;}
.order-cust-info{margin-bottom:10px;}
.order-cust-info span{display:block;color:rgba(255,255,255,.85);font-size:.83rem;line-height:1.8;}
.order-items-list{background:rgba(0,0,0,.25);border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.order-item-line{display:flex;justify-content:space-between;color:rgba(255,255,255,.75);font-size:.82rem;padding:3px 0;}
.order-item-line .amt{direction:ltr;color:var(--gold2);}
.order-total-line{display:flex;justify-content:space-between;color:var(--gold);font-size:.9rem;font-weight:bold;padding-top:8px;border-top:1px solid rgba(255,255,255,.1);}
.order-total-line .amt{direction:ltr;}
.order-note{color:rgba(255,255,255,.5);font-size:.78rem;margin-bottom:10px;}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{flex:1;min-width:60px;padding:9px 8px;border:none;border-radius:8px;font-family:'Noto Nastaliq Urdu',serif;font-size:.78rem;cursor:pointer;transition:all .2s;}
.act-done{background:linear-gradient(135deg,var(--green),#0f5920);color:#fff;}
.act-cancel{background:rgba(192,17,31,.35);border:1px solid var(--red);color:#fff;}
.act-wa{background:linear-gradient(135deg,#25d366,#128c4e);color:#fff;}
.act-btn:active{transform:scale(.95);}
.status-badge{padding:3px 10px;border-radius:20px;font-size:.72rem;}
.badge-pending{background:rgba(245,197,24,.2);color:var(--gold);}
.badge-done{background:rgba(26,122,46,.2);color:#4caf50;}
.badge-cancel{background:rgba(192,17,31,.2);color:#ef5350;}
.no-orders{text-align:center;color:rgba(255,255,255,.3);padding:40px 20px;font-size:.9rem;}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px}
</style>
</head>
<body>

<!-- ===== CUSTOMER PAGE ===== -->
<div class="page active" id="customerPage">
  <div style="max-width:480px;margin:0 auto;padding-bottom:100px;">
    <header>
      <button class="admin-btn-top" onclick="goAdmin()">🔐 ایڈمن</button>
      <div class="logo-ring">☕</div>
      <h1>کوئٹہ کراچی کیفے</h1>
      <div class="location-badge">📍 مارگلہ ٹاؤن مین مارکیٹ</div>
    </header>

    <div class="info-card">
      <div class="info-row">
        <div class="info-icon">🏪</div>
        <div><span class="info-label">کیفے کا نام</span><div class="info-value">کوئٹہ کراچی کیفے</div></div>
      </div>
      <div class="divider"></div>
      <div class="info-row">
        <div class="info-icon">📍</div>
        <div><span class="info-label">پتہ</span><div class="info-value">مارگلہ ٹاؤن مین مارکیٹ، اسلام آباد</div></div>
      </div>
      <div class="divider"></div>
      <div class="info-row">
        <div class="info-icon">📞</div>
        <div><span class="info-label">فون / واٹس ایپ</span><div class="info-value"><a href="tel:+923189681939">0318-9681939</a></div></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('chai',this)">☕ چائے</button>
      <button class="tab-btn" onclick="switchTab('paratha',this)">🫓 پراٹھا</button>
    </div>
    <div class="menu-section active" id="chai"><div class="section-title">چائے کا مینو</div></div>
    <div class="menu-section" id="paratha"><div class="section-title">پراٹھے کا مینو</div></div>
  </div>

  <button class="cart-fab" id="cartFab" onclick="openModal()" style="display:none">
    <span class="cart-count" id="cartCount">0</span>
    <span>آرڈر دیکھیں</span>
    <span>🛒</span>
  </button>
</div>

<!-- ===== ADMIN LOGIN ===== -->
<div class="page" id="adminLoginPage">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:10px;">🔐</div>
    <div class="login-title">ایڈمن پینل</div>
    <div class="login-sub">پاس ورڈ درج کریں</div>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">داخل ہوں</button>
    <div class="login-err" id="loginErr">❌ غلط پاس ورڈ</div>
    <span class="back-link" onclick="showPage('customerPage')">← واپس مینو پر</span>
  </div>
</div>

<!-- ===== ADMIN PAGE ===== -->
<div class="page" id="adminPage">
  <div class="admin-header">
    <h2>📋 ایڈمن پینل</h2>
    <button class="admin-logout" onclick="showPage('customerPage')">باہر نکلیں</button>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div style="padding:0 16px 8px;">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterOrders('all',this)">سب آرڈر</button>
      <button class="filter-tab" onclick="filterOrders('pending',this)">زیر التواء</button>
      <button class="filter-tab" onclick="filterOrders('done',this)">مکمل</button>
      <button class="filter-tab" onclick="filterOrders('cancel',this)">منسوخ</button>
    </div>
  </div>
  <div class="orders-section" id="ordersSection"></div>
</div>

<!-- ===== ORDER MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">🛒 آپ کا آرڈر</div>
    <div id="orderList"></div>
    <div class="total-row">
      <span>کل رقم</span>
      <span id="totalAmt" style="direction:ltr">Rs. 0</span>
    </div>
    <div class="customer-section">
      <div class="customer-section-title">👤 آپ کی معلومات <span style="color:rgba(255,255,255,.4);font-size:.73rem;">(ضروری)</span></div>
      <div class="field-group">
        <label class="note-label">نام <span class="required-star">*</span></label>
        <input class="field-input" type="text" id="custName" placeholder="آپ کا نام لکھیں">
      </div>
      <div class="field-group">
        <label class="note-label">فون نمبر <span class="required-star">*</span></label>
        <input class="field-input" type="tel" id="custPhone" placeholder="03XX-XXXXXXX" style="direction:ltr;text-align:right;">
      </div>
      <div class="field-group">
        <label class="note-label">گھر کا پتہ <span class="required-star">*</span></label>
        <textarea class="field-input" id="custAddress" rows="2" placeholder="گلی، مکان نمبر، علاقہ…"></textarea>
      </div>
    </div>
    <div class="field-group" style="margin-top:10px;">
      <label class="note-label">خصوصی ہدایت (اختیاری)</label>
      <textarea class="note-input" id="noteInput" rows="2" placeholder="مثلاً: کم چینی، زیادہ دودھ…"></textarea>
    </div>
    <button class="wa-btn" onclick="sendWhatsApp()">
      <span>📲</span><span>WhatsApp پر آرڈر بھیجیں</span>
    </button>
    <button class="close-modal" onclick="closeModal()">واپس جائیں</button>
  </div>
</div>

<script>
const MENU={
  chai:[
    {name:"چائے",price:70},{name:"اسپیشل چائے",price:100},{name:"گولڈن ملائی چائے",price:130},
    {name:"اسپیشل گڑ والا چائے",price:120},{name:"کشمیری چائے",price:160},{name:"کافی چائے",price:180},
    {name:"بلیک کافی",price:150},{name:"دودھ قہوہ",price:100},{name:"چالغوٹی چائے",price:140},
    {name:"منکا چائے",price:150},{name:"منکا گڑ والا چائے",price:170},{name:"منکا ملائی چائے",price:200},
    {name:"گرین ٹی",price:70},{name:"بلیک قہوہ",price:70},{name:"گرین ٹی گڑ والا",price:100},{name:"لیمن گراس",price:100}
  ],
  paratha:[
    {name:"پلین پراٹھا",price:60},{name:"آلو پراٹھا",price:150},{name:"ملائی پراٹھا",price:180},
    {name:"چاکلیٹ پراٹھا",price:200},{name:"چھری پراٹھا",price:100},{name:"آملیٹ پراٹھا",price:140},
    {name:"چکن پراٹھا",price:300},{name:"چیز پراٹھا",price:200},{name:"چکن چیز پراٹھا",price:360},
    {name:"اسپیشل چیز پراٹھا",price:500},{name:"دیسی گھی پراٹھا",price:200},{name:"زیتون پراٹھا",price:120},
    {name:"ڈرائی فروٹ پراٹھا",price:150},{name:"آلو فرائی پراٹھا",price:250},{name:"آلو چیز پراٹھا",price:250}
  ]
};

const ADMIN_PASS="cafe1234";
const cart={};
let orders=JSON.parse(localStorage.getItem('kkc_orders')||'[]');
let orderCounter=parseInt(localStorage.getItem('kkc_counter')||'1');
let currentFilter='all';

function saveData(){
  localStorage.setItem('kkc_orders',JSON.stringify(orders));
  localStorage.setItem('kkc_counter',String(orderCounter));
}

// BUILD MENU
function buildMenu(){
  ['chai','paratha'].forEach(cat=>{
    const sec=document.getElementById(cat);
    const title=sec.querySelector('.section-title');
    while(sec.lastChild!==title)sec.removeChild(sec.lastChild);
    MENU[cat].forEach((item,i)=>{
      const div=document.createElement('div');
      div.className='menu-item';
      div.style.animationDelay=(i*.05)+'s';
      div.id='item-'+cat+'-'+i;
      div.innerHTML=`<div style="flex:1"><div class="item-name">${item.name}</div><div class="item-price">Rs. ${item.price}</div></div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty('${cat}',${i},-1,event)">−</button>
          <span class="qty-num" id="qty-${cat}-${i}">0</span>
          <button class="qty-btn" onclick="changeQty('${cat}',${i},1,event)">+</button>
        </div>`;
      sec.appendChild(div);
    });
  });
}

function changeQty(cat,idx,delta,e){
  e.stopPropagation();
  const key=cat+'-'+idx;
  cart[key]=Math.max(0,(cart[key]||0)+delta);
  if(cart[key]===0)delete cart[key];
  document.getElementById('qty-'+cat+'-'+idx).textContent=cart[key]||0;
  const el=document.getElementById('item-'+cat+'-'+idx);
  (cart[key]>0)?el.classList.add('selected'):el.classList.remove('selected');
  updateFab();
  const btn=e.target;btn.style.transform='scale(.75)';setTimeout(()=>btn.style.transform='',150);
}

function updateFab(){
  const total=Object.keys(cart).reduce((s,k)=>s+cart[k],0);
  const fab=document.getElementById('cartFab');
  document.getElementById('cartCount').textContent=total;
  fab.style.display=total>0?'flex':'none';
}

function switchTab(cat,btn){
  document.querySelectorAll('.menu-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(cat).classList.add('active');
  btn.classList.add('active');
}

// MODAL
function openModal(){
  const list=document.getElementById('orderList');
  list.innerHTML='';
  let total=0,empty=true;
  ['chai','paratha'].forEach(cat=>{
    MENU[cat].forEach((item,i)=>{
      const key=cat+'-'+i;
      if(cart[key]&&cart[key]>0){
        empty=false;const sub=item.price*cart[key];total+=sub;
        const row=document.createElement('div');row.className='order-item-row';
        row.innerHTML=`<span>${item.name} × ${cart[key]}</span><span class="price">Rs. ${sub}</span>`;
        list.appendChild(row);
      }
    });
  });
  if(empty)list.innerHTML='<div class="empty-msg">کوئی آئٹم منتخب نہیں کیا</div>';
  document.getElementById('totalAmt').textContent='Rs. '+total;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function sendWhatsApp(){
  const name=document.getElementById('custName').value.trim();
  const phone=document.getElementById('custPhone').value.trim();
  const addr=document.getElementById('custAddress').value.trim();
  const note=document.getElementById('noteInput').value.trim();
  if(!name){alert('براہ کرم اپنا نام لکھیں');document.getElementById('custName').focus();return;}
  if(!phone){alert('براہ کرم فون نمبر لکھیں');document.getElementById('custPhone').focus();return;}
  if(!addr){alert('براہ کرم اپنا پتہ لکھیں');document.getElementById('custAddress').focus();return;}

  let items=[],total=0,hasItem=false;
  ['chai','paratha'].forEach(cat=>{
    MENU[cat].forEach((item,i)=>{
      const key=cat+'-'+i;
      if(cart[key]&&cart[key]>0){
        hasItem=true;const sub=item.price*cart[key];total+=sub;
        items.push({name:item.name,qty:cart[key],price:item.price,sub});
      }
    });
  });
  if(!hasItem){alert('پہلے کوئی آئٹم منتخب کریں');return;}

  const now=new Date();
  const orderId='#'+String(orderCounter).padStart(4,'0');
  orderCounter++;
  orders.unshift({id:orderId,time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    date:now.toLocaleDateString(),name,phone,addr,note,items,total,status:'pending'});
  saveData();

  let msg='🍵 *نیا آرڈر — کوئٹہ کراچی کیفے*\n';
  msg+='آرڈر نمبر: '+orderId+'\n';
  msg+='━━━━━━━━━━━━━━━━━━\n';
  msg+='👤 نام: '+name+'\n📞 نمبر: '+phone+'\n🏠 پتہ: '+addr+'\n';
  msg+='━━━━━━━━━━━━━━━━━━\n*آرڈر:*\n';
  items.forEach(it=>{msg+='✅ '+it.name+' × '+it.qty+' = Rs. '+it.sub+'\n';});
  msg+='━━━━━━━━━━━━━━━━━━\n💰 *کل رقم: Rs. '+total+'*\n';
  if(note)msg+='\n📝 ہدایت: '+note;

  window.open('https://wa.me/923189681939?text='+encodeURIComponent(msg),'_blank');

  // reset cart
  Object.keys(cart).forEach(k=>delete cart[k]);
  ['chai','paratha'].forEach(cat=>{
    MENU[cat].forEach((_,i)=>{
      const el=document.getElementById('item-'+cat+'-'+i);
      if(el){el.classList.remove('selected');document.getElementById('qty-'+cat+'-'+i).textContent='0';}
    });
  });
  updateFab();closeModal();
  ['custName','custPhone','custAddress','noteInput'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>alert('✅ آرڈر بھیج دیا گیا!\nآرڈر نمبر: '+orderId),300);
}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// PAGES
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goAdmin(){
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').style.display='none';
  showPage('adminLoginPage');
}

function checkLogin(){
  if(document.getElementById('pwInput').value===ADMIN_PASS){
    showPage('adminPage');renderAdmin();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

// ADMIN
function renderAdmin(){
  // stats
  const total=orders.length;
  const pending=orders.filter(o=>o.status==='pending').length;
  const done=orders.filter(o=>o.status==='done').length;
  const revenue=orders.filter(o=>o.status==='done').reduce((s,o)=>s+o.total,0);
  document.getElementById('statsGrid').innerHTML=
    `<div class="stat-card"><span class="stat-num">${total}</span><span class="stat-label">کل آرڈر</span></div>
     <div class="stat-card"><span class="stat-num" style="color:#ffa726">${pending}</span><span class="stat-label">زیر التواء</span></div>
     <div class="stat-card"><span class="stat-num" style="color:#4caf50">${done}</span><span class="stat-label">مکمل آرڈر</span></div>
     <div class="stat-card"><span class="stat-num" style="font-size:1rem">Rs.${revenue}</span><span class="stat-label">کل آمدنی</span></div>`;
  renderOrders();
}

function filterOrders(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders(){
  const sec=document.getElementById('ordersSection');
  const filtered=currentFilter==='all'?orders:orders.filter(o=>o.status===currentFilter);
  if(!filtered.length){sec.innerHTML='<div class="no-orders">📭 کوئی آرڈر نہیں</div>';return;}
  const sLabel={pending:'زیر التواء',done:'مکمل',cancel:'منسوخ'};
  const sBadge={pending:'badge-pending',done:'badge-done',cancel:'badge-cancel'};
  sec.innerHTML=filtered.map(o=>`
    <div class="order-card status-${o.status}">
      <div class="order-card-header">
        <div><span class="order-id">${o.id}</span> <span class="order-time">${o.date} ${o.time}</span></div>
        <span class="status-badge ${sBadge[o.status]}">${sLabel[o.status]}</span>
      </div>
      <div class="order-card-body">
        <div class="order-cust-info">
          <span>👤 ${o.name}</span>
          <span>📞 <a href="tel:${o.phone}" style="color:#4fc3f7;direction:ltr;display:inline">${o.phone}</a></span>
          <span>🏠 ${o.addr}</span>
        </div>
        <div class="order-items-list">
          ${o.items.map(it=>`<div class="order-item-line"><span>${it.name} × ${it.qty}</span><span class="amt">Rs. ${it.sub}</span></div>`).join('')}
          <div class="order-total-line"><span>کل</span><span class="amt">Rs. ${o.total}</span></div>
        </div>
        ${o.note?`<div class="order-note">📝 ${o.note}</div>`:''}
        <div class="order-actions">
          ${o.status==='pending'?`
            <button class="act-btn act-done" onclick="updateStatus('${o.id}','done')">✅ مکمل</button>
            <button class="act-btn act-cancel" onclick="updateStatus('${o.id}','cancel')">❌ منسوخ</button>`:''}
          <button class="act-btn act-wa" onclick="window.open('tel:${o.phone}')">📞 کال</button>
        </div>
      </div>
    </div>`).join('');
}

function updateStatus(id,status){
  const o=orders.find(x=>x.id===id);
  if(o){o.status=status;saveData();renderAdmin();}
}

buildMenu();
</script>
